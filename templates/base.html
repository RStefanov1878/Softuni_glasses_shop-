<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Glasses Catalogue{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('index') }}">👓 Glasses Catalogue</a>
    <nav class="site-nav">
      <a href="{{ url_for('index') }}">Catalogue</a>
      <a href="{{ url_for('contact_view') }}">Contact</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Glasses Catalogue — AI-Assisted Development exam project.</p>
  </footer>
</body>
</html>
